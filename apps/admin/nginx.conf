server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — every route serves index.html (client-side routing)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # long-cache hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
