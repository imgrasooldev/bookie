# Bookie API — deploy: cd apps/api && fly launch --no-deploy (first time) then fly deploy
app = "bookie-api"
primary_region = "sin"   # Singapore is the closest Fly region to Pakistan; run `fly platform regions` to pick

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"    # keep the API always warm — no cold-start latency
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Vehicle media uploaded via /uploads is written to the local disk and is LOST on
# redeploy. For persistence, attach a volume (see docs/DEPLOY-FLY.md) or move to S3/R2.
