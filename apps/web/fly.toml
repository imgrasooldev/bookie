# Bookie customer web — deploy: cd apps/web && fly launch --no-deploy then fly deploy
app = "bookie-web"
primary_region = "sin"

[build]
  [build.args]
    # point the web app at the deployed API (set after the API is live), and use real data
    NEXT_PUBLIC_API_URL = "https://bookie-api.fly.dev"
    NEXT_PUBLIC_USE_MOCK = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
