# Local MongoDB for Bookie. Run: docker compose up -d
# Then point the API at it: MONGO_URI=mongodb://localhost:27017/bookie
services:
  mongo:
    image: mongo:7
    container_name: bookie-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - bookie_mongo_data:/data/db

volumes:
  bookie_mongo_data:
